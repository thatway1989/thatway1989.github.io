title: Thatway1989的博客
lang: zh-CN
description: Just another documentation theme compatible with GitHub Pages, based on sphinx_rtd_theme

edit: true

copyright:
  revision: true

addons:
  - github
  - gems
  - analytics

addons_commit: true

theme: null

encoding="UTF-8"

# sort
readme_index:
  with_frontmatter: true

sass:
  style: compressed

exclude:
  - Makefile
  - Gemfile
  - Gemfile.lock
  - ci.sh
  - CODE_OF_CONDUCT.md
  - LICENSE
  - jekyll-rtd-theme.gemspec
